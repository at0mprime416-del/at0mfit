kind = "web"
previewPath = "/"
title = "At0m Fit"
version = "1.0.0"
id = "artifacts/at0mfit-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20141

[services.development]
run = "pnpm --filter @workspace/at0mfit-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/at0mfit-web", "run", "build" ]
publicDir = "artifacts/at0mfit-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20141"
BASE_PATH = "/"
